<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDI Prediction System</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 40px; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="number"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007BFF; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; padding: 15px; background: #e9f7ef; border-left: 5px solid #2ecc71; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>HDI Predictor Portal</h2>
    <form action="/predict" method="POST">
        <div class="form-group"><label>Life Expectancy (Years):</label><input type="number" step="any" name="Life_Expectancy" required></div>
        <div class="form-group"><label>Expected Years of Schooling:</label><input type="number" step="any" name="Expected_Schooling" required></div>
        <div class="form-group"><label>Mean Years of Schooling:</label><input type="number" step="any" name="Mean_Schooling" required></div>
        <div class="form-group"><label>GNI Per Capita (PPP $):</label><input type="number" step="any" name="GNI_Per_Capita" required></div>
        <button type="submit">Predict Well-Being Index</button>
    </form>
    {% if prediction_text %}
        <div class="result">
            <h3>{{ prediction_text }}</h3>
            <p><strong>Development Tier:</strong> {{ tier_text }}</p>
        </div>
    {% endif %}
</div>
</body>
</html>
